<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<titleみんなのすみか shop</title></title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  .product-list {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
  }
  .product {
    border: 1px solid #ccc;
    padding: 10px;
    width: 200px;
    text-align: center;
  }
  .product img {
    width: 100%;
    height: auto;
  }
  .product h2 {
    font-size: 1.2em;
  }
  .price {
    color: green;
    font-weight: bold;
    margin: 10px 0;
  }
  button {
    background-color: #4CAF50;
    color: white;
    padding: 8px 16px;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background-color: #45a049;
  }
</style>
</head>
<body>

<header>
  <h1>みんなのすみか shop</h1>
</header>

<div class="product-list">
  <!--ひとつめ-->
  <div class="product">
    <img src="https://via.placeholder.com/200" alt="1" />
    <h2>1</h2>
    <div class="price">¥1,000</div>
    <button>カートに追加</button>
  </div>
  <!--ふたつめ-->
  <div class="product">
    <img src="https://via.placeholder.com/200" alt="2" />
    <h2>2</h2>
    <div class="price">¥2,000</div>
    <button>カートに追加</button>
  </div>
  <!--みっつめ-->
  <div class="product">
    <img src="https://via.placeholder.com/200" alt="3" />
    <h2>3</h2>
    <div class="price">¥3,000</div>
    <button>カートに追加</button>
  </div>
</div>

</body>
</html>
